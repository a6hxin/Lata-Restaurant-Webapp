<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up – Lata Family Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --saffron:#E8821A;--saffron-dk:#B35F0A;--spice:#7B2D00;
  --cream:#FDF6EE;--gold:#C8860A;--dark:#1A0A00;
  --muted:#7A5C44;--border:#E2C9A8;--error:#D0342C;
  --success:#2E7D32;--shadow:rgba(123,45,0,0.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 90% 10%,rgba(232,130,26,0.08) 0%,transparent 50%),radial-gradient(circle at 10% 90%,rgba(200,134,10,0.07) 0%,transparent 50%);pointer-events:none;}
.deco{position:fixed;border-radius:50%;border:1.5px solid rgba(232,130,26,0.18);pointer-events:none;}

.card{background:#fff;border-radius:20px;border:1px solid var(--border);box-shadow:0 8px 40px var(--shadow);width:100%;max-width:460px;padding:2.25rem 2.25rem;position:relative;z-index:1;animation:slideUp 0.45s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.brand{text-align:center;margin-bottom:1.5rem;}
.brand-icon{width:58px;height:58px;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 0.7rem;font-size:24px;}
.brand h1{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--spice);}
.brand p{font-size:0.82rem;color:var(--muted);margin-top:2px;font-weight:300;}
hr.div{border:none;border-top:1px solid var(--border);margin:0 0 1.3rem;}

/* steps */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:1.5rem;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:500;border:2px solid var(--border);color:var(--muted);background:#fff;transition:all 0.3s;}
.step-dot.active{background:var(--saffron);border-color:var(--saffron);color:#fff;}
.step-dot.done{background:var(--success);border-color:var(--success);color:#fff;}
.step-label{font-size:0.65rem;color:var(--muted);white-space:nowrap;}
.step-line{width:40px;height:2px;background:var(--border);margin-bottom:16px;transition:background 0.3s;}
.step-line.done{background:var(--success);}

.field{margin-bottom:1rem;}
label{display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:5px;}
.input-wrap{position:relative;display:flex;align-items:center;}
.iico{position:absolute;left:12px;width:16px;height:16px;opacity:0.45;pointer-events:none;}
input[type=email],input[type=password],input[type=text],input[type=tel]{width:100%;height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 42px 0 37px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--dark);background:var(--cream);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
input:focus{border-color:var(--saffron);box-shadow:0 0 0 3px rgba(232,130,26,0.12);background:#fff;}
input.err{border-color:var(--error);box-shadow:0 0 0 3px rgba(208,52,44,0.1);}
.tpw{position:absolute;right:12px;background:none;border:none;cursor:pointer;padding:0;opacity:0.45;transition:opacity 0.2s;display:flex;align-items:center;}
.tpw:hover{opacity:0.8;}
.ferr{font-size:0.74rem;color:var(--error);margin-top:4px;display:none;}
.ferr.show{display:block;}

/* two-col grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}

/* pw strength */
.pw-strength{margin-top:6px;height:4px;border-radius:4px;background:#eee;overflow:hidden;}
.pw-bar{height:100%;border-radius:4px;width:0;transition:width 0.3s,background 0.3s;}
.pw-label{font-size:0.71rem;color:var(--muted);margin-top:3px;}

/* terms */
.terms{display:flex;align-items:flex-start;gap:8px;margin:1rem 0 1.1rem;font-size:0.8rem;color:var(--muted);}
.terms input{width:15px;height:15px;margin-top:1px;accent-color:var(--saffron);flex-shrink:0;}
.terms a{color:var(--saffron-dk);text-decoration:none;font-weight:500;}

.btn-pri{width:100%;height:46px;background:linear-gradient(135deg,var(--saffron),var(--gold));border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,134,10,0.35);}
.btn-pri:active{transform:scale(0.98);}
.btn-pri:disabled{opacity:0.6;cursor:not-allowed;}
.spin{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;margin:0 auto;}
.btn-pri.loading .lbl{display:none;}
.btn-pri.loading .spin{display:block;}
@keyframes sp{to{transform:rotate(360deg)}}

.alert,.s-alert{border-radius:8px;padding:10px 14px;font-size:0.82rem;margin-bottom:1rem;display:none;align-items:center;gap:8px;}
.alert{background:#FFF3F2;border:1px solid #FFCDD2;color:var(--error);}
.s-alert{background:#F1F8E9;border:1px solid #C5E1A5;color:var(--success);}
.alert.show,.s-alert.show{display:flex;}

.login-row{text-align:center;margin-top:1.2rem;padding:12px 16px;background:linear-gradient(135deg,rgba(232,130,26,0.06),rgba(200,134,10,0.06));border:1px solid var(--border);border-radius:12px;font-size:0.88rem;color:var(--muted);}
.login-row a{display:inline-block;margin-left:6px;color:#fff;background:linear-gradient(135deg,var(--saffron),var(--gold));font-weight:500;font-size:0.85rem;padding:5px 14px;border-radius:8px;text-decoration:none;transition:opacity 0.2s;}
.login-row a:hover{opacity:0.88;}
.sec-note{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:1.1rem;font-size:0.72rem;color:var(--muted);opacity:0.7;}

/* password rules list */
.pw-rules{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;}
.pw-rule{font-size:0.71rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.pw-rule.ok{color:var(--success);}
.pw-rule::before{content:'○';font-size:8px;flex-shrink:0;}
.pw-rule.ok::before{content:'●';}
</style>
</head>
<body>
<div class="deco" style="width:320px;height:320px;top:-100px;right:-80px;"></div>
<div class="deco" style="width:220px;height:220px;top:-60px;right:-40px;border-color:rgba(200,134,10,0.12);"></div>
<div class="deco" style="width:260px;height:260px;bottom:-100px;left:-70px;"></div>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🍛</div>
    <h1>Create Account</h1>
    <p>Join the Lata family — it's free!</p>
  </div>

  <!-- step indicator -->
  <div class="steps">
    <div class="step">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-label">Details</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step">
      <div class="step-dot" id="dot2">2</div>
      <div class="step-label">Verify</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step">
      <div class="step-dot" id="dot3">3</div>
      <div class="step-label">Profile</div>
    </div>
  </div>

  <hr class="div"/>

  <div class="alert" id="alertBox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16.01"/></svg><span id="alertMsg"></span></div>

  <form id="signupForm" novalidate autocomplete="on">
    <div class="grid2">
      <div class="field">
        <label>First name</label>
        <div class="input-wrap">
          <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a7 7 0 0 0-14 0v2"/></svg>
          <input type="text" id="fname" placeholder="Priya" autocomplete="given-name" aria-required="true"/>
        </div>
        <div class="ferr" id="fnameErr"></div>
      </div>
      <div class="field">
        <label>Last name</label>
        <div class="input-wrap">
          <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a7 7 0 0 0-14 0v2"/></svg>
          <input type="text" id="lname" placeholder="Sharma" autocomplete="family-name"/>
        </div>
        <div class="ferr" id="lnameErr"></div>
      </div>
    </div>

    <div class="field">
      <label>Email address</label>
      <div class="input-wrap">
        <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><polyline points="2,4 12,13 22,4"/></svg>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email" aria-required="true"/>
      </div>
      <div class="ferr" id="emailErr"></div>
    </div>

    <div class="field">
      <label>Phone number (India)</label>
      <div class="input-wrap">
        <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.69 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.1 4.18 2 2 0 0 1 5.08 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input type="tel" id="phone" placeholder="9876543210" autocomplete="tel" inputmode="tel" maxlength="10" aria-required="true"/>
      </div>
      <div class="ferr" id="phoneErr"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" aria-required="true" oninput="checkStrength(this.value)"/>
        <button type="button" class="tpw" onclick="togglePw('password','eyePw')" aria-label="Show password">
          <svg id="eyePw" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
      <div class="pw-label" id="pwLabel"></div>
      <div class="pw-rules" id="pwRules">
        <div class="pw-rule" id="r-len">Min 8 characters</div>
        <div class="pw-rule" id="r-upper">One uppercase</div>
        <div class="pw-rule" id="r-num">One number</div>
        <div class="pw-rule" id="r-special">One special char</div>
      </div>
      <div class="ferr" id="passwordErr"></div>
    </div>

    <div class="field">
      <label>Confirm password</label>
      <div class="input-wrap">
        <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="confirmPw" placeholder="Repeat your password" autocomplete="new-password"/>
        <button type="button" class="tpw" onclick="togglePw('confirmPw','eyeCpw')" aria-label="Show password">
          <svg id="eyeCpw" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7A5C44" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="ferr" id="confirmPwErr"></div>
    </div>

    <div class="terms">
      <input type="checkbox" id="agreeTerms" aria-required="true"/>
      <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a> of Lata Family Restaurant.</span>
    </div>
    <div class="ferr" id="termsErr" style="margin-top:-8px;margin-bottom:10px;"></div>

    <button type="submit" class="btn-pri" id="submitBtn">
      <span class="lbl">Create Account &amp; Send OTP</span>
      <div class="spin"></div>
    </button>
  </form>

  <div class="login-row">
    Already have an account?
    <a href="login.html">Sign In</a>
  </div>
  <div class="sec-note">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Your data is encrypted and never sold
  </div>
</div>

<script>
(function(){
'use strict';
const API_BASE = 'http://localhost:5000/api';
const $ = id => document.getElementById(id);

function showErr(id,msg){$(id).textContent=msg;$(id).classList.add('show');$(id.replace('Err','')).classList.add('err');}
function clrErr(id){$(id).classList.remove('show');const inp=$(id.replace('Err',''));if(inp)inp.classList.remove('err');}
function showAlert(msg){$('alertMsg').textContent=msg;$('alertBox').classList.add('show');}
function hideAlert(){$('alertBox').classList.remove('show');}
function setLoading(on){$('submitBtn').classList.toggle('loading',on);$('submitBtn').disabled=on;}

window.togglePw = function(inputId,iconId){
  const inp=$(inputId), show=inp.type==='password';
  inp.type=show?'text':'password';
  $(iconId).innerHTML=show
    ?`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
    :`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
};

window.checkStrength = function(val){
  const bar=$('pwBar'), lbl=$('pwLabel');
  const rules={len:val.length>=8, upper:/[A-Z]/.test(val), num:/[0-9]/.test(val), special:/[^A-Za-z0-9]/.test(val)};
  ['len','upper','num','special'].forEach(k=>{
    $('r-'+k).classList.toggle('ok', rules[k]);
  });
  const score=Object.values(rules).filter(Boolean).length;
  const levels=[
    {w:'0%',c:'#eee',t:''},
    {w:'25%',c:'#E53935',t:'Weak'},
    {w:'50%',c:'#FB8C00',t:'Fair'},
    {w:'75%',c:'#FDD835',t:'Good'},
    {w:'100%',c:'#43A047',t:'Strong — great!'},
  ];
  const lvl=levels[score];
  bar.style.width=lvl.w; bar.style.background=lvl.c;
  lbl.textContent=lvl.t; lbl.style.color=lvl.c;
};

const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const PHONE_RE=/^[6-9]\d{9}$/;

function validate(){
  let ok=true;
  ['fnameErr','lnameErr','emailErr','phoneErr','passwordErr','confirmPwErr','termsErr'].forEach(clrErr);
  hideAlert();
  const fname=$('fname').value.trim(), lname=$('lname').value.trim();
  const email=$('email').value.trim(), phone=$('phone').value.trim();
  const pw=$('password').value, cpw=$('confirmPw').value;
  const agreed=$('agreeTerms').checked;
  if(!fname){showErr('fnameErr','First name is required.');ok=false;}
  if(!email||!EMAIL_RE.test(email)){showErr('emailErr','Enter a valid email address.');ok=false;}
  if(!phone||!PHONE_RE.test(phone)){showErr('phoneErr','Enter a valid 10-digit Indian mobile number.');ok=false;}
  if(pw.length<8){showErr('passwordErr','Password must be at least 8 characters.');ok=false;}
  else if(!/[A-Z]/.test(pw)){showErr('passwordErr','Password needs at least one uppercase letter.');ok=false;}
  else if(!/[0-9]/.test(pw)){showErr('passwordErr','Password needs at least one number.');ok=false;}
  if(pw!==cpw){showErr('confirmPwErr','Passwords do not match.');ok=false;}
  if(!agreed){showErr('termsErr','Please agree to the Terms of Service to continue.');ok=false;}
  return ok;
}

$('signupForm').addEventListener('submit', async function(e){
  e.preventDefault();
  if(!validate()) return;
  setLoading(true);
  try{
    const body={
      name:($('fname').value.trim()+' '+$('lname').value.trim()).trim(),
      email:$('email').value.trim().toLowerCase(),
      phone:$('phone').value.trim(),
      password:$('password').value,
    };
    const res=await fetch(`${API_BASE}/auth/signup`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.message||'Signup failed.');
    // Save userId for OTP page
    sessionStorage.setItem('lata_userId', data.userId);
    sessionStorage.setItem('lata_email', body.email);
    window.location.href='otp-verify.html';
  }catch(err){
    showAlert(err.message);
  }finally{
    setLoading(false);
  }
});

// Clear errors on input
['fname','lname','email','phone','password','confirmPw'].forEach(id=>{
  const el=$(id); if(el) el.addEventListener('input',()=>clrErr(id+'Err'));
});
})();
</script>
</body>
</html>
